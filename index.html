<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30-дневные упражнения Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --surface-0: #fcfcfb;
      --surface-1: #f5f5f4;
      --surface-2: #ffffff;
      --text-primary: #0b0b0b;
      --text-secondary: #52514e;
      --text-muted: #898781;
      --border: rgba(11, 11, 11, 0.10);
      --fill-accent: #2a78d6;
      --on-accent: #ffffff;
      --bg-accent: #e6f1fb;
      --text-accent: #185fa5;
      --bg-success: #e8f5e9;
      --text-success: #2e7d32;
      --bg-warning: #fff3e0;
      --text-warning: #e65100;
      --bg-error: #ffebee;
      --text-error: #c62828;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #0b0b0b;
        --surface-1: #1a1a19;
        --surface-2: #2c2c2a;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #898781;
        --border: rgba(255, 255, 255, 0.10);
        --bg-accent: #0c447c;
        --text-accent: #85b7eb;
        --bg-success: #1b5e20;
        --text-success: #81c784;
        --bg-warning: #e65100;
        --text-warning: #ffb74d;
        --bg-error: #b71c1c;
        --text-error: #ef5350;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface-0);
      color: var(--text-primary);
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
    .loading-text { color: var(--text-secondary); font-size: 16px; }
    .app-screen { display: none; }
    .app-screen.active { display: block; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 0.5px solid var(--border); }
    .header h1 { font-size: 24px; font-weight: 500; }
    .header-info { font-size: 12px; color: var(--text-secondary); }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
    .tab-btn { padding: 12px 16px; background: transparent; border: none; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-secondary); border-bottom: 2px solid transparent; white-space: nowrap; }
    .tab-btn.active { color: var(--fill-accent); border-bottom-color: var(--fill-accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
    .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
    .card-title { font-size: 16px; font-weight: 500; margin: 0; }
    .card-subtitle { font-size: 13px; color: var(--text-secondary); margin: 4px 0 0; }
    .day-badge { background: var(--fill-accent); color: var(--on-accent); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; margin-bottom: 12px; }
    .btn { padding: 10px 16px; background: var(--fill-accent); color: var(--on-accent); border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; margin-top: 12px; width: 100%; }
    .btn-secondary { background: var(--surface-1); color: var(--text-primary); border: 0.5px solid var(--border); }
    .btn-danger { background: var(--bg-error); color: var(--text-error); }
    .btn-small { padding: 6px 12px; font-size: 12px; margin-top: 0; width: auto; margin-left: 8px; margin-bottom: 0; }
    .exercise-item { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .exercise-item.completed { background: var(--bg-success); border-color: var(--text-success); }
    .exercise-info { flex: 1; }
    .exercise-name { font-weight: 500; font-size: 14px; }
    .exercise-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .day-cell { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .day-cell.selected { background: var(--bg-accent); border-color: var(--fill-accent); color: var(--text-accent); font-weight: 500; }
    .day-cell small { display: block; font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .schedule-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 24px; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1000; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: var(--surface-2); border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; border: 0.5px solid var(--border); }
    .modal-header { margin-bottom: 16px; }
    .modal-header h2 { font-size: 20px; font-weight: 500; margin: 0 0 4px; }
    .modal-input { margin-bottom: 16px; }
    .modal-input label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .modal-input input, .modal-input select { width: 100%; padding: 8px 12px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--surface-1); color: var(--text-primary); font-family: inherit; }
    .modal-buttons { display: flex; gap: 8px; margin-top: 24px; }
    .modal-buttons button { flex: 1; padding: 10px; }
    .empty-state { text-align: center; padding: 32px; color: var(--text-secondary); }
    .progress-bar { background: var(--surface-1); border-radius: 4px; height: 8px; margin-top: 8px; overflow: hidden; }
    .progress-fill { background: var(--fill-accent); height: 100%; transition: width 0.3s; }
    .stat-row { display: flex; justify-content: space-between; padding: 12px; background: var(--surface-1); border-radius: var(--radius); margin-bottom: 8px; font-size: 14px; }
    .notification { position: fixed; top: 20px; right: 20px; background: var(--bg-success); border: 0.5px solid var(--text-success); color: var(--text-success); padding: 16px; border-radius: 8px; z-index: 2000; max-width: 300px; animation: slideIn 0.3s; }
    @keyframes slideIn { from { transform: translateX(400px); } to { transform: translateX(0); } }
  </style>
</head>
<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-text">⏳ Загружаю приложение...</div>
  </div>

  <div id="appScreen" class="app-screen">
    <div class="container">
      <div class="header">
        <div>
          <h1>30-дневные упражнения</h1>
          <div class="header-info">☁️ Каждое упражнение длится 30 дней</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard')">📅 Сегодня</button>
        <button class="tab-btn" onclick="switchTab('exercises')">💪 Упражнения</button>
        <button class="tab-btn" onclick="switchTab('schedule')">🗓️ Расписание</button>
        <button class="tab-btn" onclick="switchTab('stats')">📊 Статистика</button>
      </div>

      <div id="dashboard" class="tab-content active">
        <div id="dashboardContent"></div>
      </div>

      <div id="exercises" class="tab-content">
        <button class="btn" onclick="openExerciseModal()">+ Добавить упражнение</button>
        <div id="exercisesList" style="margin-top: 24px;"></div>
      </div>

      <div id="schedule" class="tab-content">
        <h3>Неделя упражнений</h3>
        <div class="schedule-grid" id="scheduleGrid"></div>
        <div id="scheduleContent"></div>
      </div>

      <div id="stats" class="tab-content">
        <div id="statsContent"></div>
      </div>
    </div>
  </div>

  <div id="exerciseModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Добавить упражнение на 30 дней</h2>
      </div>
      <div class="modal-input">
        <label>Название упражнения</label>
        <input type="text" id="exerciseName" placeholder="Например: Отжимания">
      </div>
      <div class="modal-input">
        <label>День недели</label>
        <select id="exerciseDay">
          <option value="0">Понедельник</option>
          <option value="1">Вторник</option>
          <option value="2">Среда</option>
          <option value="3">Четверг</option>
          <option value="4">Пятница</option>
          <option value="5">Суббота</option>
          <option value="6">Воскресенье</option>
        </select>
      </div>
      <div class="modal-input">
        <label>Время тренировки</label>
        <input type="time" id="exerciseTime" value="10:00">
      </div>
      <div class="modal-input">
        <label>YouTube ссылка (опционально)</label>
        <input type="text" id="exerciseLink" placeholder="https://youtube.com/watch?v=...">
      </div>
      <div class="modal-buttons">
        <button class="btn" onclick="saveExercise()">Добавить</button>
        <button class="btn btn-secondary" onclick="closeExerciseModal()">Отмена</button>
      </div>
    </div>
  </div>

  <div id="completeModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="completeTitle">Отметить выполнение</h2>
      </div>
      <div class="modal-input">
        <label>Сколько повторений выполнил?</label>
        <input type="text" id="completionReps" placeholder="Например: 15, или 3 подхода по 10">
      </div>
      <div class="modal-buttons">
        <button class="btn" onclick="confirmCompletion()">Готово</button>
        <button class="btn btn-secondary" onclick="closeCompleteModal()">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    let dbClient = null;
    let exercises = [];
    let completingExerciseId = null;
    const dayNames = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
    const dayShorts = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

    const SUPABASE_URL = 'https://xdfqumzvpjjvimvxelge.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ZQYjEcdANVvYVNgyRdI3tg_OVFjIZVk';

    async function init() {
      try {
        const { createClient } = window.supabase;
        dbClient = createClient(SUPABASE_URL, SUPABASE_KEY);
        await loadExercises();
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('appScreen').classList.add('active');
        
        // Проверяем уведомления каждую минуту
        setInterval(checkNotifications, 60000);
        checkNotifications();
      } catch (error) {
        console.error('❌ Ошибка:', error);
        document.getElementById('loadingScreen').innerHTML = '<div class="loading-text">❌ Ошибка: ' + error.message + '</div>';
      }
    }

    async function loadExercises() {
      if (!dbClient) return;
      const { data } = await dbClient.from('exercises').select('*');
      exercises = (data || []).filter(ex => !isExerciseExpired(ex));
      renderExercises();
      renderDashboard();
    }

    function isExerciseExpired(ex) {
      if (!ex.start_date) return false;
      const startDate = new Date(ex.start_date);
      const today = new Date();
      const daysPassed = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
      return daysPassed >= 30;
    }

    function getExerciseDayInCycle(ex) {
      if (!ex.start_date) return 1;
      const startDate = new Date(ex.start_date);
      const today = new Date();
      const daysPassed = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
      return Math.min(daysPassed + 1, 30);
    }

    function getDaysLeftInCycle(ex) {
      if (!ex.start_date) return 30;
      const startDate = new Date(ex.start_date);
      const today = new Date();
      const daysPassed = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
      return Math.max(30 - daysPassed, 0);
    }

    function getTodayIndex() {
      return new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
    }

    function getTodayDateStr() {
      const today = new Date();
      return today.toISOString().split('T')[0];
    }

    function getTodayExercises() {
      const todayIndex = getTodayIndex();
      return exercises.filter(e => e.day_of_week === todayIndex && !isExerciseExpired(e));
    }

    function renderDashboard() {
      const today = new Date();
      const todayExercises = getTodayExercises();
      const dayStr = dayNames[getTodayIndex()];
      const dateStr = today.toLocaleDateString('ru-RU', {month: 'long', day: 'numeric'});

      let html = `<h2>${dayStr}, ${dateStr}</h2>`;

      if (todayExercises.length === 0) {
        html += '<div class="empty-state">Нет упражнений на сегодня</div>';
      } else {
        const todayDateStr = getTodayDateStr();
        const completedCount = todayExercises.filter(e => e.completed_dates && e.completed_dates[todayDateStr]).length;
        
        html += `<div class="stat-row">
          <span>Выполнено:</span>
          <strong>${completedCount}/${todayExercises.length}</strong>
        </div>`;
        
        html += '<div class="progress-bar"><div class="progress-fill" style="width: ' + 
          (todayExercises.length > 0 ? Math.round(completedCount / todayExercises.length * 100) : 0) + '%"></div></div>';

        html += '<div style="margin-top: 24px;">';
        todayExercises.forEach((ex) => {
          const dayInCycle = getExerciseDayInCycle(ex);
          const isCompleted = ex.completed_dates && ex.completed_dates[todayDateStr];
          html += `
            <div class="exercise-item ${isCompleted ? 'completed' : ''}" style="margin-bottom: 12px;">
              <div class="exercise-info">
                <div class="exercise-name">${ex.name}</div>
                <div class="exercise-meta">🕐 ${ex.time} • День ${dayInCycle}/30</div>
                ${isCompleted ? `<div style="font-size: 12px; margin-top: 4px;">✅ ${ex.completed_dates[todayDateStr]}</div>` : ''}
              </div>
              <div>
                ${ex.link ? `<a href="${ex.link}" target="_blank" style="font-size: 14px; text-decoration: none; margin-right: 8px;">🎥</a>` : ''}
                <button class="btn-small btn-secondary" onclick="openCompleteModal(${ex.id}, '${ex.name}')">${isCompleted ? 'Изменить' : 'Отметить'}</button>
              </div>
            </div>
          `;
        });
        html += '</div>';
      }

      document.getElementById('dashboardContent').innerHTML = html;
    }

    function renderExercises() {
      const html = exercises.map(ex => {
        const dayInCycle = getExerciseDayInCycle(ex);
        const daysLeft = getDaysLeftInCycle(ex);
        return `
          <div class="card" style="margin-bottom: 16px;">
            <div class="card-header">
              <div>
                <div class="day-badge">День ${dayInCycle}/30 (осталось ${daysLeft})</div>
                <p class="card-title">${ex.name}</p>
                <p class="card-subtitle">🕐 ${ex.time} • ${dayNames[ex.day_of_week]}</p>
              </div>
            </div>
            <div style="margin-top: 12px; display: flex; gap: 8px;">
              ${ex.link ? `<a href="${ex.link}" target="_blank" style="padding: 6px 12px; background: var(--fill-accent); color: white; border-radius: 4px; text-decoration: none; font-size: 12px;">🎥 Видео</a>` : ''}
              <button class="btn-small btn-danger" onclick="deleteExercise(${ex.id})">Удалить</button>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('exercisesList').innerHTML = html || '<div class="empty-state">Нет активных упражнений</div>';
    }

    function openExerciseModal() {
      document.getElementById('exerciseName').value = '';
      document.getElementById('exerciseDay').value = getTodayIndex();
      document.getElementById('exerciseTime').value = '10:00';
      document.getElementById('exerciseLink').value = '';
      document.getElementById('exerciseModal').classList.add('active');
    }

    function closeExerciseModal() {
      document.getElementById('exerciseModal').classList.remove('active');
    }

    async function saveExercise() {
      const name = document.getElementById('exerciseName').value.trim();
      const dayOfWeek = document.getElementById('exerciseDay').value;
      const time = document.getElementById('exerciseTime').value;
      const link = document.getElementById('exerciseLink').value.trim();

      if (!name || !time) {
        alert('Заполни название и время');
        return;
      }

      const today = new Date().toISOString().split('T')[0];

      const { error } = await dbClient.from('exercises').insert([{
        name,
        day_of_week: parseInt(dayOfWeek),
        time,
        link: link || null,
        start_date: today,
        completed_dates: {}
      }]);

      if (error) {
        alert('Ошибка: ' + error.message);
      } else {
        closeExerciseModal();
        await loadExercises();
      }
    }

    async function deleteExercise(id) {
      if (confirm('Удалить упражнение?')) {
        await dbClient.from('exercises').delete().eq('id', id);
        await loadExercises();
      }
    }

    function openCompleteModal(id, name) {
      completingExerciseId = id;
      document.getElementById('completeTitle').textContent = `Отметить: ${name}`;
      document.getElementById('completionReps').value = '';
      document.getElementById('completeModal').classList.add('active');
    }

    function closeCompleteModal() {
      document.getElementById('completeModal').classList.remove('active');
    }

    async function confirmCompletion() {
      const reps = document.getElementById('completionReps').value.trim();
      if (!reps) {
        alert('Укажи повторения');
        return;
      }

      const todayDateStr = getTodayDateStr();
      const ex = exercises.find(e => e.id === completingExerciseId);
      
      const completedDates = ex.completed_dates || {};
      completedDates[todayDateStr] = reps;

      const { error } = await dbClient
        .from('exercises')
        .update({ completed_dates: completedDates })
        .eq('id', completingExerciseId);

      if (!error) {
        closeCompleteModal();
        await loadExercises();
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
      if (tab === 'dashboard') renderDashboard();
      if (tab === 'schedule') renderSchedule();
      if (tab === 'stats') renderStats();
    }

    function renderSchedule() {
      const grid = dayShorts.map((day, i) => {
        const dayExercises = exercises.filter(e => e.day_of_week === i && !isExerciseExpired(e));
        return `<div class="day-cell" onclick="selectDay(${i})">${day}<small>${dayExercises.length} упр.</small></div>`;
      }).join('');
      document.getElementById('scheduleGrid').innerHTML = grid;
      selectDay(getTodayIndex());
    }

    function selectDay(dayIndex) {
      document.querySelectorAll('.day-cell').forEach((el, i) => {
        if (i === dayIndex) el.classList.add('selected');
        else el.classList.remove('selected');
      });

      const dayExercises = exercises.filter(e => e.day_of_week === dayIndex && !isExerciseExpired(e));
      const html = dayExercises.length > 0
        ? dayExercises.map(ex => {
            const dayInCycle = getExerciseDayInCycle(ex);
            return `
              <div class="exercise-item" style="margin-bottom: 12px;">
                <div class="exercise-info">
                  <div class="exercise-name">${ex.name}</div>
                  <div class="exercise-meta">🕐 ${ex.time} • День ${dayInCycle}/30</div>
                </div>
                ${ex.link ? `<a href="${ex.link}" target="_blank" style="font-size: 14px; text-decoration: none;">🎥</a>` : ''}
              </div>
            `;
          }).join('')
        : '<div class="empty-state">Нет упражнений</div>';
      document.getElementById('scheduleContent').innerHTML = html;
    }

    function renderStats() {
      const totalExercises = exercises.length;
      const totalCompletions = exercises.reduce((sum, e) => sum + Object.keys(e.completed_dates || {}).length, 0);
      const todayCompleted = getTodayExercises().filter(e => {
        const todayDateStr = getTodayDateStr();
        return e.completed_dates && e.completed_dates[todayDateStr];
      }).length;
      
      const html = `
        <div class="grid-2">
          <div class="card">
            <p class="card-title">Активные упражнения</p>
            <p style="font-size: 28px; font-weight: 500; margin-top: 8px;">${totalExercises}</p>
          </div>
          <div class="card">
            <p class="card-title">Выполнено раз</p>
            <p style="font-size: 28px; font-weight: 500; margin-top: 8px;">${totalCompletions}</p>
          </div>
          <div class="card">
            <p class="card-title">Сегодня выполнено</p>
            <p style="font-size: 28px; font-weight: 500; margin-top: 8px;">${todayCompleted}</p>
          </div>
        </div>
      `;
      document.getElementById('statsContent').innerHTML = html;
    }

    function checkNotifications() {
      const now = new Date();
      const currentTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
      const todayExercises = getTodayExercises();

      todayExercises.forEach(ex => {
        if (ex.time === currentTime) {
          showNotification(ex.name);
        }
      });
    }

    function showNotification(exerciseName) {
      // Звук
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.frequency.value = 800;
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.5);

      // Всплывающее окно
      const notif = document.createElement('div');
      notif.className = 'notification';
      notif.innerHTML = `🔔 Время: ${exerciseName}!`;
      document.body.appendChild(notif);

      setTimeout(() => notif.remove(), 5000);

      // Браузер уведомление
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('30-дневные упражнения', {
          body: `Пора делать: ${exerciseName}!`,
          icon: '💪'
        });
      }
    }

    // Запрос разрешения на уведомления
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    init();
  </script>
</body>
</html>
